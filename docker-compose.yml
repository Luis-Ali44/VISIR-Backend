services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python  
    volumes:
      - ./app:/app/app
      - ./rag:/app/rag
      - ./ingestion:/app/ingestion
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 


  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: visir_dev
      POSTGRES_USER: visir
      POSTGRES_PASSWORD: visir123
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visir -d visir_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: