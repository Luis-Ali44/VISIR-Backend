name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v3

      - name: Instalar dependencias
        run: uv sync

      - name: Ruff — linter
        run: uv run ruff check app

      - name: Mypy — tipos
        run: uv run mypy app

      - name: Pytest — tests
        run: uv run pytest

      - name: Docker — compilar imagen
        run: docker build -t visir-api .