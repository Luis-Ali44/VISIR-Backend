  repos:
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.13
      hooks:
        - id: ruff
          args: [--fix]
        - id: ruff-format

    - repo: https://github.com/pre-commit/mirrors-mypy
      rev: v1.10.0
      hooks:
        - id: mypy
          additional_dependencies: [pydantic>=2.7.0, fastapi>=0.115.0]